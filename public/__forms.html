<!-- Static form skeleton for Netlify build-time form detection. DO NOT DELETE. -->
<html>
  <body>
    <!-- Client Inquiry / Home page form -->
    <form name="inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="inquiry" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="service" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <!-- Full Contact form -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="company" />
      <input name="service" />
      <input name="budget" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <!-- Careers / Job application form -->
    <form name="careers" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="careers" />
      <input name="name" />
      <input name="email" />
      <input name="phone" />
      <input name="position" />
      <input name="experience" />
      <input name="linkedin" />
      <input name="portfolio" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
